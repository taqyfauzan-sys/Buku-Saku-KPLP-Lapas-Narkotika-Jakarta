<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Saku KPLP — Lapas Narkotika Kelas IIA Jakarta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy-950:#0a1e3d;
  --navy-900:#0d2a6b;
  --navy-800:#123a91;
  --navy-700:#1560c4;
  --paper:#eef6fc;
  --paper-dim:#dbeaf7;
  --ink:#1b1b18;
  --ink-soft:#4a4a44;
  --brass:#0fa0f0;
  --brass-light:#5cc4f7;
  --alert:#8c3a2b;
  --line:#c7dcf0;
  --radius:3px;
  --shadow-sm:0 1px 2px rgba(15,36,57,0.06), 0 1px 1px rgba(15,36,57,0.08);
  --shadow-md:0 4px 14px rgba(15,36,57,0.09), 0 1px 3px rgba(15,36,57,0.1);
  --shadow-lg:0 12px 32px rgba(10,26,41,0.16), 0 2px 8px rgba(10,26,41,0.1);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse 900px 600px at 8% -5%, rgba(15,160,240,0.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 105% 15%, rgba(18,58,145,0.07), transparent 55%),
    radial-gradient(ellipse 800px 600px at 95% 105%, rgba(15,160,240,0.08), transparent 60%),
    radial-gradient(circle at 1px 1px, rgba(15,36,57,0.06) 1px, transparent 0),
    var(--paper);
  background-size:auto, auto, auto, 24px 24px, auto;
  background-attachment:fixed, fixed, fixed, local, fixed;
  background-repeat:no-repeat, no-repeat, no-repeat, repeat, no-repeat;
  color:var(--ink);
  font-family:'IBM Plex Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--brass-light);color:var(--navy-950);}
.content{animation:contentFade .35s ease;position:relative;z-index:1;}
@keyframes contentFade{
  from{opacity:0;transform:translateY(6px);}
  to{opacity:1;transform:translateY(0);}
}

/* decorative diagonal ribbon accents, echoing the printed buku saku cover */
.main::before,.main::after{
  content:'';
  position:fixed;
  width:340px;height:340px;
  pointer-events:none;
  z-index:0;
  opacity:0.5;
}
.main::before{
  top:-140px;right:-120px;
  background:conic-gradient(from 200deg at 50% 50%, rgba(15,160,240,0.16), transparent 35%);
  border-radius:50%;
}
.main::after{
  bottom:-160px;right:20%;
  background:conic-gradient(from 20deg at 50% 50%, rgba(18,58,145,0.10), transparent 40%);
  border-radius:50%;
}
@media (max-width:880px){
  .main::before,.main::after{display:none;}
}

/* ---------- layout shell ---------- */
.shell{display:flex;min-height:100vh;}

/* ---------- sidebar ---------- */
.sidebar{
  width:300px;
  min-width:300px;
  background:var(--navy-950);
  background-image:
    linear-gradient(180deg, rgba(92,196,247,0.05) 0%, transparent 200px),
    radial-gradient(circle at 1px 1px, rgba(92,196,247,0.06) 1px, transparent 0);
  background-size:auto, 18px 18px;
  color:#e7e2d3;
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  box-shadow:var(--shadow-lg);
  z-index:20;
}
.sidebar::-webkit-scrollbar{width:6px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--navy-700);}

.brand{
  padding:24px 20px 18px;
  border-bottom:1px solid rgba(92,196,247,0.25);
  position:relative;
}
.brand .stamp{
  width:46px;height:46px;
  border:2px solid var(--brass-light);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;font-weight:600;letter-spacing:0.5px;
  color:var(--brass-light);
  margin-bottom:12px;
  transform:rotate(-6deg);
  box-shadow:0 0 0 3px rgba(92,196,247,0.12), 0 2px 6px rgba(0,0,0,0.3);
  background:radial-gradient(circle at 35% 30%, rgba(92,196,247,0.1), transparent 70%);
}
.brand .kop{font-size:10.5px;letter-spacing:1px;color:#9fb2c4;text-transform:uppercase;line-height:1.5;}
.brand h1{
  font-family:'Zilla Slab',serif;
  font-size:22px;
  font-weight:700;
  margin:9px 0 3px;
  color:#fff;
  letter-spacing:0.2px;
}
.brand .sub{
  font-size:11px;color:var(--brass-light);font-family:'IBM Plex Mono',monospace;
  display:inline-flex;align-items:center;gap:6px;
}
.brand .sub::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:#4caf6d;
  box-shadow:0 0 0 3px rgba(76,175,109,0.2);
  animation:pulseDot 2s ease-in-out infinite;
}
@keyframes pulseDot{
  0%,100%{opacity:1;}
  50%{opacity:0.4;}
}

.search-box{padding:14px 18px;border-bottom:1px solid rgba(92,196,247,0.15);}
.search-box input{
  width:100%;
  background:var(--navy-900);
  border:1px solid var(--navy-700);
  color:#fff;
  padding:9px 12px;
  font-size:13.5px;
  border-radius:var(--radius);
  font-family:'IBM Plex Sans',sans-serif;
}
.search-box input:focus{outline:2px solid var(--brass);border-color:var(--brass);}
.search-box input::placeholder{color:#7c8ea0;}

.nav-scroll{flex:1;padding:6px 0 20px;}
.nav-group-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:1.4px;
  text-transform:uppercase;
  color:#7c8ea0;
  padding:16px 20px 6px;
}
.nav-item{
  display:flex;
  gap:10px;
  align-items:flex-start;
  padding:9px 20px;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s, border-color .15s, padding-left .15s;
}
.nav-item:hover{background:rgba(92,196,247,0.08);padding-left:23px;}
.nav-item.active{
  background:linear-gradient(90deg, rgba(92,196,247,0.16), rgba(92,196,247,0.03));
  border-left-color:var(--brass);
}
.nav-item .num{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--brass-light);
  min-width:22px;
  padding-top:1px;
}
.nav-item .lbl{font-size:13px;line-height:1.4;color:#dcd6c3;transition:color .15s;}
.nav-item.active .lbl{color:#fff;font-weight:500;}

.sidebar-foot{
  padding:14px 20px 18px;
  border-top:1px solid rgba(92,196,247,0.15);
  font-size:11px;
  color:#7c8ea0;
  line-height:1.6;
}
.sidebar-foot a{color:var(--brass-light);text-decoration:none;}

/* ---------- mobile nav toggle ---------- */
.nav-toggle{
  display:none;
  position:fixed;
  top:14px;left:14px;
  z-index:60;
  background:var(--navy-950);
  color:#fff;
  border:1px solid var(--brass);
  width:42px;height:42px;
  border-radius:50%;
  font-size:18px;
  align-items:center;justify-content:center;
  cursor:pointer;
}

/* ---------- main content ---------- */
.main{flex:1;min-width:0;position:relative;overflow:hidden;}
.topbar{
  position:sticky;top:0;z-index:10;
  background:rgba(244,241,232,0.92);
  backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);
  padding:16px 40px;
  display:flex;justify-content:space-between;align-items:center;
  gap:16px;
}
.topbar .crumbs{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);letter-spacing:0.3px;}
.topbar .actions{display:flex;gap:10px;}
.btn{
  border:1px solid var(--navy-800);
  background:#fff;
  color:var(--navy-900);
  padding:9px 16px;
  font-size:12.5px;
  font-family:'IBM Plex Sans',sans-serif;
  font-weight:600;
  border-radius:20px;
  cursor:pointer;
  display:flex;align-items:center;gap:6px;
  box-shadow:var(--shadow-sm);
  transition:background .15s, color .15s, box-shadow .15s, transform .1s;
}
.btn:hover{background:var(--navy-900);color:#fff;box-shadow:var(--shadow-md);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn.primary{background:var(--brass);border-color:var(--brass);color:#241704;}
.btn.primary:hover{background:var(--brass-light);}

.content{max-width:820px;margin:0 auto;padding:44px 40px 100px;}

/* cover page */
.cover{
  text-align:center;
  padding:60px 20px 40px;
}
.cover .kop-line{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;letter-spacing:1.5px;
  color:var(--ink-soft);text-transform:uppercase;
  margin-bottom:26px;
}
.badge-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:28px;
  margin:0 auto 26px;
}
.badge-row .kop-logo{
  width:64px;height:64px;
  object-fit:contain;
  flex-shrink:0;
}
.cover .badge{
  width:100px;height:100px;
  border:3px solid var(--brass);
  border-radius:50%;
  margin:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Zilla Slab',serif;
  font-weight:700;font-size:27px;
  color:var(--navy-900);
  position:relative;
  background:radial-gradient(circle at 35% 30%, rgba(185,134,46,0.08), transparent 70%);
  box-shadow:var(--shadow-md), inset 0 0 0 5px rgba(185,134,46,0.08);
  flex-shrink:0;
}
.cover .badge::after{
  content:'KPLP';
  position:absolute;
  bottom:-11px;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;letter-spacing:2px;
  background:var(--paper);
  padding:0 6px;
  color:var(--brass);
}
.cover h1{
  font-family:'Zilla Slab',serif;
  font-size:46px;
  font-weight:700;
  margin:0 0 8px;
  color:var(--navy-950);
  line-height:1.1;
  letter-spacing:-0.5px;
}
.cover h2{
  font-family:'IBM Plex Sans',sans-serif;
  font-weight:500;
  font-size:17px;
  color:var(--ink-soft);
  margin:0 0 30px;
  letter-spacing:0.3px;
  position:relative;
  padding-bottom:26px;
}
.cover h2::after{
  content:'';
  position:absolute;
  bottom:0;left:50%;
  transform:translateX(-50%);
  width:52px;height:3px;
  background:var(--brass);
  border-radius:2px;
}
.cover .meta{
  display:inline-block;
  text-align:left;
  background:#fff;
  box-shadow:var(--shadow-sm);
  padding:20px 26px;
  margin-top:10px;
  font-size:13.5px;
  color:var(--ink-soft);
  line-height:1.9;
  border-left:3px solid var(--brass);
}
.cover .meta b{color:var(--ink);}
.toc-grid{
  margin-top:46px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 24px;
  text-align:left;
}
.toc-item{
  display:flex;gap:10px;align-items:center;
  padding:11px 12px;
  background:#fff;
  box-shadow:var(--shadow-sm);
  cursor:pointer;
  font-size:13.5px;
  transition:box-shadow .15s, transform .15s;
}
.toc-item:hover{box-shadow:var(--shadow-md);transform:translateX(2px);}
.toc-item:hover .toc-title{color:var(--brass);}
.toc-item .toc-num{font-family:'IBM Plex Mono',monospace;color:var(--brass);font-weight:600;min-width:20px;}
.toc-item .toc-title{color:var(--ink);transition:color .15s;}

/* chapter view */
.chapter-head{margin-bottom:34px;}
.chapter-eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;letter-spacing:1.5px;
  color:var(--brass);text-transform:uppercase;
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;
}
.chapter-eyebrow .stampnum{
  width:30px;height:30px;
  border:1.5px solid var(--brass);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
}
.chapter-head h1{
  font-family:'Zilla Slab',serif;
  font-size:31px;
  line-height:1.25;
  margin:0 0 8px;
  color:var(--navy-950);
}
.chapter-head .ringkas{color:var(--ink-soft);font-size:14.5px;font-style:italic;}

.section{margin-bottom:32px;}
.section-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;letter-spacing:1.3px;
  text-transform:uppercase;
  color:var(--navy-700);
  border-bottom:2px solid var(--navy-800);
  padding-bottom:6px;
  margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.section p{font-size:15px;line-height:1.75;color:var(--ink);margin:0;}

.tujuan-list{list-style:none;margin:0;padding:0;display:grid;gap:9px;}
.tujuan-list li{
  display:flex;gap:10px;
  font-size:14.5px;line-height:1.6;
  padding:11px 15px;
  background:#fff;
  border-left:3px solid var(--navy-700);
  box-shadow:var(--shadow-sm);
  transition:box-shadow .15s, transform .15s;
}
.tujuan-list li:hover{box-shadow:var(--shadow-md);transform:translateX(2px);}
.tujuan-list li::before{content:'▸';color:var(--brass);font-weight:700;}

.chapter-photo{
  width:100%;
  margin:0 0 18px;
  overflow:hidden;
  background:var(--navy-950);
  position:relative;
  box-shadow:var(--shadow-md);
}
.chapter-photo::before,.chapter-photo::after{
  content:'';
  position:absolute;
  width:18px;height:18px;
  border-color:rgba(92,196,247,0.85);
  z-index:2;pointer-events:none;
}
.chapter-photo::before{top:8px;left:8px;border-top:2px solid;border-left:2px solid;}
.chapter-photo::after{bottom:8px;right:8px;border-bottom:2px solid;border-right:2px solid;}
.chapter-photo img{
  width:100%;
  height:360px;
  object-fit:cover;
  display:block;
  transform-origin:center;
  animation:kenburns 14s ease-in-out infinite alternate;
  filter:saturate(0.94) contrast(1.03);
}
@keyframes kenburns{
  from{transform:scale(1) translate(0,0);}
  to{transform:scale(1.12) translate(-1.5%, -2%);}
}
@media (prefers-reduced-motion: reduce){
  .chapter-photo img{animation:none;}
}

/* cover hero carousel */
.hero-carousel{
  position:relative;
  width:100%;
  max-width:640px;
  height:280px;
  margin:0 auto 34px;
  overflow:hidden;
  background:var(--navy-950);
  box-shadow:var(--shadow-lg);
}
.hero-carousel::before,
.hero-carousel::after,
.hero-carousel .vf-tr,
.hero-carousel .vf-bl{
  content:'';
  position:absolute;
  width:22px;height:22px;
  border-color:rgba(92,196,247,0.85);
  z-index:3;
  pointer-events:none;
}
.hero-carousel::before{top:10px;left:10px;border-top:2px solid;border-left:2px solid;}
.hero-carousel::after{bottom:10px;right:10px;border-bottom:2px solid;border-right:2px solid;}
.hero-carousel .vf-tr{top:10px;right:10px;border-top:2px solid rgba(92,196,247,0.85);border-right:2px solid rgba(92,196,247,0.85);}
.hero-carousel .vf-bl{bottom:10px;left:10px;border-bottom:2px solid rgba(92,196,247,0.85);border-left:2px solid rgba(92,196,247,0.85);}
.hero-carousel .vf-rec{
  position:absolute;top:16px;left:38px;z-index:3;
  display:flex;align-items:center;gap:6px;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:1.5px;color:#f0ead9;
}
.hero-carousel .vf-rec::before{
  content:'';width:7px;height:7px;border-radius:50%;background:#e05a45;
  box-shadow:0 0 0 3px rgba(224,90,69,0.25);
  animation:pulseDot 1.4s ease-in-out infinite;
}
.hero-carousel .hc-slide{
  position:absolute;inset:0;
  opacity:0;
  transition:opacity 1.2s ease;
}
.hero-carousel .hc-slide.active{opacity:1;}
.hero-carousel .hc-slide img{
  width:100%;height:100%;object-fit:cover;
  animation:kenburns 9s ease-in-out infinite alternate;
  filter:saturate(0.94) contrast(1.03);
}
.hero-carousel .hc-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(11,28,44,0.05) 40%,rgba(11,28,44,0.62) 100%);
}
.hero-carousel .hc-caption{
  position:absolute;left:0;right:0;bottom:0;
  padding:14px 22px;
  color:#f0ead9;
  font-family:'IBM Plex Mono',monospace;
  font-size:11.5px;letter-spacing:0.6px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:2;
}
.hero-carousel .hc-dots{display:flex;gap:5px;}
.hero-carousel .hc-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.35);transition:background .3s, transform .3s;}
.hero-carousel .hc-dot.active{background:var(--brass-light);transform:scale(1.4);}
@media (prefers-reduced-motion: reduce){
  .hero-carousel .hc-slide img{animation:none;}
  .hero-carousel .vf-rec::before{animation:none;}
}
@media (max-width:600px){
  .hero-carousel{height:190px;}
}

.section-label-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
  border-bottom:2px solid var(--navy-800);
  padding-bottom:6px;
  margin-bottom:14px;
  flex-wrap:wrap;
}
.btn-play{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;font-weight:600;letter-spacing:0.3px;
  background:var(--navy-900);
  color:var(--brass-light);
  border:1px solid var(--navy-700);
  padding:6px 12px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}
.btn-play:hover{background:var(--navy-800);border-color:var(--brass);}

/* ---- animated timeline ---- */
.alur-flow{
  position:relative;
  padding-left:38px;
}
.tl-line{
  position:absolute;
  left:12px; top:4px; bottom:4px;
  width:2px;
  background:var(--line);
}
.tl-runner{
  position:absolute;
  left:6px; top:0;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--brass);
  box-shadow:0 0 0 4px rgba(185,134,46,0.18);
  opacity:0;
}
.alur-flow.animate .tl-runner{
  opacity:1;
  animation:runnerMove var(--total,3s) linear forwards;
}
@keyframes runnerMove{
  0%{top:0;}
  100%{top:calc(100% - 14px);}
}

.tl-node{
  display:flex;gap:14px;align-items:flex-start;
  padding:12px 0;
  position:relative;
  opacity:1;
}
.alur-flow.animate .tl-node,
.alur-flow.animate .tl-branch{
  opacity:0;
  animation:stepIn .45s ease forwards;
  animation-delay:var(--d,0s);
}
.alur-flow.animate .tl-node .tl-dot{
  transform:scale(0.4);
  animation:idxPop .4s cubic-bezier(.34,1.56,.64,1) forwards;
  animation-delay:calc(var(--d,0s) + .08s);
}
@keyframes stepIn{
  from{opacity:0;transform:translateX(-12px);}
  to{opacity:1;transform:translateX(0);}
}
@keyframes idxPop{
  from{transform:scale(0.4);}
  to{transform:scale(1);}
}
.tl-dot{
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
  font-size:12px;
  color:#fff;
  background:var(--navy-800);
  min-width:26px;height:26px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  position:relative;
  z-index:2;
  margin-left:-38px;
  margin-right:12px;
}
.tl-decision .tl-dot.tl-diamond{
  background:var(--brass);color:#241704;
  border-radius:6px;
  transform:rotate(45deg) scale(1);
}
.alur-flow.animate .tl-decision .tl-dot.tl-diamond{
  animation:diamondPop .4s cubic-bezier(.34,1.56,.64,1) forwards;
  animation-delay:calc(var(--d,0s) + .08s);
}
@keyframes diamondPop{
  from{transform:rotate(45deg) scale(0.4);}
  to{transform:rotate(45deg) scale(1);}
}
.tl-decision .tl-dot.tl-diamond span,
.tl-decision .tl-dot.tl-diamond{ }
.tl-decision .tl-dot.tl-diamond::before{
  content:'?';
  display:block;
  transform:rotate(-45deg);
}
.tl-decision .tl-dot.tl-diamond{color:transparent;}
.tl-txt{font-size:14.5px;line-height:1.6;padding-top:3px;color:var(--ink);}

.tl-branch{
  margin-left:0;
  padding:6px 0 14px 0;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.tl-chip{
  flex:1;
  min-width:160px;
  font-size:13px;
  line-height:1.5;
  padding:10px 12px 10px 14px;
  border-radius:4px;
  position:relative;
  background:#fff;
}
.tl-chip-tag{
  display:block;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:1px;
  font-weight:700;
  margin-bottom:4px;
}
.tl-chip-ya{
  border:1.5px solid #4a7c5c;
  border-left:4px solid #4a7c5c;
}
.tl-chip-ya .tl-chip-tag{color:#3d6b4d;}
.tl-chip-tidak{
  border:1.5px solid var(--alert);
  border-left:4px solid var(--alert);
}
.tl-chip-tidak .tl-chip-tag{color:var(--alert);}

.alur-note{
  margin-top:10px;
  font-size:12px;color:var(--ink-soft);
  font-family:'IBM Plex Mono',monospace;
  background:var(--paper-dim);
  padding:8px 12px;
  border-radius:var(--radius);
}
@media (prefers-reduced-motion: reduce){
  .alur-flow.animate .tl-node,
  .alur-flow.animate .tl-branch,
  .alur-flow.animate .tl-node .tl-dot,
  .alur-flow.animate .tl-decision .tl-dot.tl-diamond,
  .alur-flow.animate .tl-runner{animation:none !important;opacity:1;transform:none;}
  .tl-decision .tl-dot.tl-diamond{transform:rotate(45deg);}
}

.ceklis-list{list-style:none;margin:0;padding:0;display:grid;gap:9px;}
.ceklis-list li{
  display:flex;gap:11px;align-items:flex-start;
  font-size:14.5px;line-height:1.6;
  padding:12px 15px;
  background:#fdfaf1;
  border:1px solid var(--brass-light);
  box-shadow:var(--shadow-sm);
  transition:box-shadow .15s;
}
.ceklis-list li:hover{box-shadow:var(--shadow-md);}
.ceklis-list li .box{
  min-width:17px;height:17px;
  border:2px solid var(--brass);
  margin-top:2px;
  flex-shrink:0;
}

.chapter-nav{
  display:flex;justify-content:space-between;
  margin-top:50px;padding-top:24px;
  border-top:1px solid var(--line);
  gap:14px;
}
.chapter-nav .navlink{
  flex:1;
  padding:14px 16px;
  border:1px solid var(--line);
  cursor:pointer;
  font-size:13px;
}
.chapter-nav .navlink:hover{border-color:var(--brass);}
.chapter-nav .navlink .dir{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;}
.chapter-nav .navlink.right{text-align:right;}
.chapter-nav .navlink .ttl{font-weight:600;color:var(--navy-950);margin-top:4px;}

/* closing pages */
.closing-block{margin-bottom:38px;}
.closing-block h2{font-family:'Zilla Slab',serif;font-size:24px;color:var(--navy-950);margin-bottom:14px;}
.pustaka-list{margin:0;padding-left:20px;}
.pustaka-list li{font-size:14px;line-height:1.8;margin-bottom:8px;color:var(--ink);}
.penulis-card{display:flex;gap:20px;align-items:flex-start;background:#fff;box-shadow:var(--shadow-md);padding:22px;}
.penulis-photo{
  width:92px;height:92px;
  border-radius:50%;
  overflow:hidden;
  flex-shrink:0;
  border:3px solid var(--brass-light);
  box-shadow:var(--shadow-sm);
  cursor:pointer;
  position:relative;
}
.penulis-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.penulis-photo:hover{border-color:var(--brass);}

/* clickable photo hint (viewfinder photos + author photo) */
.chapter-photo, .penulis-photo, .hc-slide{cursor:pointer;}
.chapter-photo .zoom-hint, .hero-carousel .zoom-hint{
  position:absolute;bottom:10px;right:10px;
  background:rgba(10,30,61,0.65);
  color:#fff;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:0.5px;
  padding:4px 9px;
  border-radius:20px;
  z-index:2;
  opacity:0;
  transition:opacity .2s;
  pointer-events:none;
}
.chapter-photo:hover .zoom-hint, .hero-carousel:hover .zoom-hint{opacity:1;}

/* lightbox */
.lightbox{
  position:fixed;inset:0;z-index:200;
  display:none;
  align-items:center;justify-content:center;
}
.lightbox.open{display:flex;}
.lb-backdrop{
  position:absolute;inset:0;
  background:rgba(6,14,26,0.92);
}
.lb-stage{
  position:relative;
  max-width:min(90vw, 800px);
  max-height:86vh;
  z-index:2;
  display:flex;flex-direction:column;align-items:center;
}
.lb-img{
  max-width:100%;
  max-height:70vh;
  object-fit:contain;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  background:#0a1e3d;
}
.lb-close{
  position:absolute;top:-42px;right:0;
  background:none;border:none;color:#fff;
  font-size:22px;cursor:pointer;
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
}
.lb-close:hover{color:var(--brass-light);}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.25);
  color:#fff;
  width:44px;height:44px;
  border-radius:50%;
  font-size:22px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.lb-nav:hover{background:rgba(255,255,255,0.22);}
.lb-prev{left:-56px;}
.lb-next{right:-56px;}
.lb-caption{
  margin-top:16px;
  text-align:center;
  color:#f0ead9;
}
.lb-label{
  display:block;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;letter-spacing:1.5px;
  color:var(--brass-light);
  text-transform:uppercase;
  margin-bottom:4px;
}
.lb-sub{display:block;font-family:'Zilla Slab',serif;font-size:17px;}
.lb-count{
  display:block;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;color:#9fb2c4;
  margin-top:6px;
}
@media (max-width:700px){
  .lb-prev{left:6px;}
  .lb-next{right:6px;}
  .lb-stage{max-width:94vw;}
}

/* search results overlay */
.search-results{
  position:absolute;top:100%;left:0;right:0;
  background:var(--navy-900);
  border:1px solid var(--brass);
  max-height:320px;overflow-y:auto;
  z-index:30;
  display:none;
}
.search-results.show{display:block;}
.sr-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--navy-700);}
.sr-item:hover{background:rgba(92,196,247,0.12);}
.sr-item .sr-bab{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--brass-light);}
.sr-item .sr-ttl{font-size:13px;color:#fff;margin-top:2px;}
.search-box{position:relative;}

/* print styles */
@media print{
  .sidebar,.topbar,.nav-toggle,.chapter-nav{display:none !important;}
  .main{width:100%;}
  .content{max-width:100%;padding:0;}
  body{background:#fff;}
  .chapter-page{page-break-after:always;}
}

/* responsive */
@media (max-width:880px){
  .badge-row{gap:14px;}
  .badge-row .kop-logo{width:44px;height:44px;}
  .sidebar{
    position:fixed;left:0;top:0;
    transform:translateX(-100%);
    transition:transform .25s ease;
    z-index:50;
    width:82%;
    max-width:320px;
  }
  .sidebar.open{transform:translateX(0);}
  .nav-toggle{display:flex;}
  .topbar{padding:14px 18px 14px 64px;}
  .content{padding:32px 20px 80px;}
  .cover h1{font-size:30px;}
  .toc-grid{grid-template-columns:1fr;}
  .chapter-nav{flex-direction:column;}
  .overlay-bg{
    display:none;
    position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;
  }
  .overlay-bg.show{display:block;}
}
</style>
